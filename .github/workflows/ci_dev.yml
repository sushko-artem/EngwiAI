name: Dev Branch CI
on:
  workflow_dispatch:
#   push:
#     branches: [dev]
#     paths-ignore:
#       - '**.md'
#       - 'docs/**'
jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: development
          tags: backend_test:latest
          load: true
          cache-from: |
            type=gha,scope=backend
          cache-to: |
            type=gha,mode=max,scope=backend

      - name: Build and cache frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: development
          tags: frontend_test:latest
          load: true
          cache-from: |
            type=gha,scope=frontend
          cache-to: |
            type=gha,mode=max,scope=frontend

      - name: Run Smoke Tests
        run: npm run test:ci:smoke

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs backend_test || true
          docker logs frontend_test || true
          docker logs nginx_test || true
          docker logs postgres_test || true

      - name: Clean Up
        if: always()
        run: npm run test:ci:down
