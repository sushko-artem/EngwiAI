name: Dev Branch CI
on:
  workflow_dispatch:
#   push:
#     branches: [dev]
#     paths-ignore:
#       - '**.md'
#       - 'docs/**'
jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{  runner.os }}-buildx-${{ hashFiles('**/package-lock.json', '**/Dockerfile')}}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images with cache
        run: docker compose -f compose.test.ci.yaml build

      - name: Run Smoke Tests
        run: npm run test:ci:smoke

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs backend_test || true
          docker logs frontend_test || true
          docker logs nginx_test || true
          docker logs postgres_test || true

      - name: Clean Up
        if: always()
        run: npm run test:ci:down
