name: Main CI Pipeline
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  actions: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install deps
        run: cd frontend && npm ci

      - name: Run Unit tests
        run: npm run test:unit

  build-images:
    needs: unit-tests
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          target: development
          tags: backend_test:latest
          load: true
          build-args: |
            DATABASE_URL=${{ secrets.TEST_DATABASE_URL }}
          cache-from: |
            type=gha,scope=backend
          cache-to: |
            type=gha,mode=max,scope=backend
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          target: development
          tags: frontend_test:latest
          load: true
          cache-from: |
            type=gha,scope=frontend
          cache-to: |
            type=gha,mode=max,scope=frontend
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Upload backend image
        uses: actions/upload-artifact@v4
        with:
          name: image-backend
          path: /tmp/backend.tar
          retention-days: 7

      - name: Upload frontend image
        uses: actions/upload-artifact@v4
        with:
          name: image-frontend
          path: /tmp/frontend.tar
          retention-days: 7

  e2e-tests:
    needs: build-images
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, critical, regression]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download images
        id: download_images
        uses: actions/download-artifact@v8
        with:
          pattern: image-*
          path: /tmp
          merge-multiple: true

      - name: Load images
        run: |
          docker load < /tmp/backend.tar
          docker load < /tmp/frontend.tar
          docker images

      - name: Run ${{matrix.suite}} tests
        run: CYPRESS_SPEC="cypress/e2e/${{matrix.suite}}/**/*.cy.ts" npm run test:ci:custom

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{matrix.suite}}
          path: frontend/cypress/screenshots/
          retention-days: 3
