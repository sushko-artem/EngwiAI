name: Main CI Pipeline
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json')}}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install deps
        run: cd frontend && npm ci

      - name: Run Unit tests
        run: npm run test:unit

  build-images:
    needs: unit-tests
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Build and cache backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: development
          tags: backend_test:latest
          load: true
          cache-from: |
            type=gha,scope=backend
          cache-to: |
            type=gha,mode=max,scope=backend

      - name: Build and cache frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: development
          tags: frontend_test:latest
          load: true
          cache-from: |
            type=gha,scope=frontend
          cache-to: |
            type=gha,mode=max,scope=frontend

  e2e-tests:
    needs: build-images
    strategy:
      fail-fast: true
      matrix:
        suite: [smoke, critical, regression]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Pull backend from cache
        run: |
          docker buildx build \
            --cache-from=type=gha,scope=backend \
            --output=type=docker \
            --tag=backend_test:latest \
            ./backend

      - name: Pull frontend from cache
        run: |
          docker buildx build \
          --cache-from=type=gha,scope=frontend \
          --output=type=docker \
          --tag=frontend_test:latest \
          ./frontend

      - name: Run ${{matrix.suite}} tests
        id: tests
        run: CYPRESS_SPEC="cypress/e2e/${{matrix.suite}}/**/*.cy.ts" npm run test:ci:custom

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs backend_test || true
          docker logs frontend_test || true
          docker logs nginx_test || true
          docker logs postgres_test || true
