services:
  postgres_test:
    image: postgres:17
    container_name: postgres_test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend_test:
    build:
      context: ./backend
      target: development
    container_name: backend_test
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    volumes:
      - ./backend:/app
      - backend_test_node_modules:/app/node_modules
    depends_on:
      postgres_test:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_test:5432/${POSTGRES_DB}?schema=public"
    env_file:
      - ./backend/.env.test

  frontend_test:
    build:
      context: ./frontend
      target: development
    container_name: frontend_test
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env.test
    depends_on:
      - backend_test

  nginx_test:
    image: nginx:alpine
    container_name: nginx_test
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx-test.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend_test
      - backend_test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 30s
      retries: 3

  cypress:
    image: cypress/included:cypress-15.10.0-node-24.13.1-chrome-144.0.7559.132-1-ff-147.0.3-edge-144.0.3719.115-1
    container_name: cypress
    network_mode: host
    entrypoint:
      ["cypress", "run", "--spec", "${CYPRESS_SPEC:-cypress/e2e/**/*.cy.ts}"]
    depends_on:
      - nginx_test
      - frontend_test
      - backend_test
    environment:
      CYPRESS_BASE_URL: http://localhost:8080
    volumes:
      - ./frontend/cypress:/e2e/cypress
      - ./frontend/cypress.config.ts:/e2e/cypress.config.ts
      - ./frontend/node_modules:/e2e/node_modules
      - ./frontend/package.json:/e2e/package.json
      - ./frontend/src:/e2e/src
    working_dir: /e2e

volumes:
  backend_test_node_modules:
  frontend_test_node_modules:
